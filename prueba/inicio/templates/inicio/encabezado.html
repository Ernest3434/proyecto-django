<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<!-- CORRECCIÓN: Se quitó user-scalable=no y maximum-scale=1 -->
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Sistema de registro de alumnos DSM">

<title>{% block titulo %}{% endblock %}</title>

{% load static %}
<link href="{% static 'inicio/css/bootstrap.min.css' %}" rel="stylesheet" type="text/css">
<link href="{% static 'inicio/css/londinium-theme.css' %}" rel="stylesheet" type="text/css">
<link href="{% static 'inicio/css/styles.css' %}" rel="stylesheet" type="text/css">
<link href="{% static 'inicio/css/icons.css' %}" rel="stylesheet" type="text/css">

<!-- CORRECCIÓN: http → https en Google Fonts -->
<link href="https://fonts.googleapis.com/css?family=Open+Sans:400,300,600,700&subset=latin,cyrillic-ext" rel="stylesheet" type="text/css">

<!-- CORRECCIÓN: http → https en jQuery y jQueryUI -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.1/jquery.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.10.2/jquery-ui.min.js"></script>

<!-- CORRECCIÓN: Se eliminaron todos los scripts que causaban error 404 -->
<script src="{% static 'inicio/js/bootstrap.min.js' %}"></script>
<script src="{% static 'inicio/js/application.js' %}"></script>

</head>

<body>

<div class="page-container">

    <!-- Sidebar -->
    <div class="sidebar">

        <!-- Usuario -->
        <div class="user-menu dropdown">
            <a href="#">
                <!-- CORRECCIÓN: alt descriptivo en la imagen -->
                <img src="{% block imagen %}{% endblock %}" alt="{% block imagen_alt %}Logo DSM{% endblock %}">
                <div class="user-info">
                    {% block span %}{% endblock %}
                </div>
            </a>
        </div>

        <!-- Menú -->
        <div class="sidebar-content">
            <ul class="navigation">
                <li><a href="{% url 'Principal' %}">Principal</a></li>
                <li><a href="{% url 'Formulario' %}">Registrar</a></li>
                <li><a href="{% url 'Contacto' %}">Contactanos</a></li>
                <li><a href="{% url 'Comentarios' %}">Comentarios</a></li>
            </ul>
        </div>

    </div> <!-- FIN sidebar -->

    <!-- CORRECCIÓN: <main> como punto de referencia principal -->
    <main class="page-content">

        {% block encabezado %}{% endblock %}

        <!-- CORRECCIÓN: breadcrumb con <li> correcto -->
        <div class="breadcrumb-line">
            <ul class="breadcrumb">
                <li>
                    <a href="{% url 'Principal' %}">
                        {% if request.path == '/' %}
                            Principal
                        {% else %}
                            Principal {{ request.path }}
                        {% endif %}
                    </a>
                </li>
            </ul>
        </div>

        <!-- CONTENIDO -->
        {% block contenido %}
        {% endblock %}

    </main> <!-- FIN page-content -->

</div> <!-- FIN page-container -->

</body>
</html>
